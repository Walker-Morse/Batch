name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Vulnerability scan (govulncheck — OWASP Addendum F)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
