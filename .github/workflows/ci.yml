name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      # Go's ./... excludes _-prefixed directories (_shared, _schema, etc.)
      # All packages must be listed explicitly — use Makefile targets.
      - name: Vet
        run: make vet

      # On main: record results to Aurora test_runs table.
      # On PRs: plain test (no DB write — DB not reachable from PR context).
      - name: Test
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            us-east-1
          RDS_CLUSTER_ARN:       arn:aws:rds:us-east-1:307871782435:cluster:onefintechdev-auroraclusterd4efe71c-aqigxft0mb87
          RDS_SECRET_ARN:        arn:aws:secretsmanager:us-east-1:307871782435:secret:AuroraClusterSecretD25348DD-8IIFZe5Ng6w8-r4PTV2
          CI_RUN_ID:             ${{ github.run_id }}
          CI_SHA:                ${{ github.sha }}
          CI_BRANCH:             ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            make test-record
          else
            make test
          fi

      # Option A smoke test — in-process wiring, no infrastructure required.
      # Exercises Stages 1–4 with fake dependencies.
      # Catches wiring regressions, interface mismatches, nil pointer panics.
      - name: Smoke (Option A — in-process, no infrastructure)
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            us-east-1
          RDS_CLUSTER_ARN:       arn:aws:rds:us-east-1:307871782435:cluster:onefintechdev-auroraclusterd4efe71c-aqigxft0mb87
          RDS_SECRET_ARN:        arn:aws:secretsmanager:us-east-1:307871782435:secret:AuroraClusterSecretD25348DD-8IIFZe5Ng6w8-r4PTV2
          CI_RUN_ID:             ${{ github.run_id }}
          CI_SHA:                ${{ github.sha }}
          CI_BRANCH:             ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            make smoke-record
          else
            make smoke
          fi

      - name: Vulnerability scan (govulncheck — OWASP Addendum F)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./member_enrollment/... ./benefit_loading/... \
            ./fis_reconciliation/... ./dead_letter/... ./sanctions_screening/... \
            ./fbo_reconciliation/... ./_shared/... ./_cmd/...

  build-grafana:
    name: Build & push custom Grafana image
    runs-on: ubuntu-latest
    # Only push image on main — PRs just validate the build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO:     onefintech-dev/grafana
          IMAGE_TAG:    10.4.3-morse
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            infra/grafana/
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "Pushed $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"

      - name: Update ECS service to use new image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO:     onefintech-dev/grafana
          IMAGE_TAG:    10.4.3-morse
        run: |
          # Get current task def, swap image, register new revision, update service
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition onefintech-dev-grafana \
            --query 'taskDefinition' --output json)

          NEW_DEF=$(echo "$CURRENT" | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                      'compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          for c in td['containerDefinitions']:
              if c['name'] == 'grafana':
                  c['image'] = '$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG'
                  print(f'Updated image to: {c[\"image\"]}', flush=True)
          print(json.dumps(td))
          " 2>/dev/null | tail -1)

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: $NEW_ARN"

          aws ecs update-service \
            --cluster onefintech-dev \
            --service onefintech-dev-grafana \
            --task-definition "$NEW_ARN" \
            --query 'service.taskDefinition' --output text
          echo "Service updated"
