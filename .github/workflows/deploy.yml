name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_INGEST_TASK: onefintech-dev/ingest-task
  ECR_API_SERVER:  onefintech-dev/api-server

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
      # Use make test to include _-prefixed packages (_shared, _schema, etc.)
      # bare `go test ./...` silently excludes them.
      - name: Test
        run: make test
      - name: Smoke (Option A — in-process, no infrastructure)
        run: make smoke

  build-ingest-task:
    name: Build ingest-task image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-onefintech-dev
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, and push ingest-task
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_INGEST_TASK:$IMAGE_TAG -t $REGISTRY/$ECR_INGEST_TASK:latest .
          docker push $REGISTRY/$ECR_INGEST_TASK:$IMAGE_TAG
          docker push $REGISTRY/$ECR_INGEST_TASK:latest
          echo "image=$REGISTRY/$ECR_INGEST_TASK:$IMAGE_TAG" >> $GITHUB_OUTPUT

  build-api-server:
    name: Build api-server image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-onefintech-dev
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, and push api-server
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f Dockerfile.api-server \
            -t $REGISTRY/$ECR_API_SERVER:$IMAGE_TAG \
            -t $REGISTRY/$ECR_API_SERVER:latest \
            .
          docker push $REGISTRY/$ECR_API_SERVER:$IMAGE_TAG
          docker push $REGISTRY/$ECR_API_SERVER:latest
          echo "image=$REGISTRY/$ECR_API_SERVER:$IMAGE_TAG" >> $GITHUB_OUTPUT

  cdk-deploy:
    name: CDK Deploy DEV
    runs-on: ubuntu-latest
    needs: [build-ingest-task, build-api-server]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-onefintech-dev
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci
      - name: CDK Bootstrap (idempotent)
        working-directory: infra
        run: npx cdk bootstrap aws://${{ env.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} --require-approval never
      - name: CDK Deploy DEV
        working-directory: infra
        run: npm run deploy:dev
      - name: Print Swagger UI URL
        run: |
          echo "Swagger UI available at:"
          aws cloudformation describe-stacks \
            --stack-name OneFintechDev \
            --query "Stacks[0].Outputs[?OutputKey=='ApiServerSwaggerUrl'].OutputValue" \
            --output text
